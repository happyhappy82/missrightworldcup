<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏆 패션 월드컵</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: #0a0a0a;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== 업로드 화면 ===== */
#upload-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

#upload-screen h1 {
  font-size: 2.5rem;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#upload-screen .subtitle {
  color: #888;
  font-size: 1rem;
  margin-bottom: 40px;
}

.upload-area {
  width: 100%;
  max-width: 600px;
  border: 3px dashed #333;
  border-radius: 20px;
  padding: 60px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: #111;
}

.upload-area:hover, .upload-area.dragover {
  border-color: #ff6b6b;
  background: #1a1a1a;
}

.upload-area .icon { font-size: 4rem; margin-bottom: 16px; }
.upload-area p { font-size: 1.1rem; color: #aaa; }
.upload-area .hint { font-size: 0.85rem; color: #666; margin-top: 8px; }

#file-input { display: none; }

/* 미리보기 */
.preview-section {
  width: 100%;
  max-width: 800px;
  margin-top: 30px;
  display: none;
}

.preview-section h3 { margin-bottom: 12px; color: #ccc; font-size: 1rem; }

.preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}

.preview-item {
  position: relative;
  aspect-ratio: 1;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid #222;
}

.preview-item img { width: 100%; height: 100%; object-fit: cover; }

.preview-item .remove-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(255,0,0,0.8);
  border: none;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.preview-item .photo-number {
  position: absolute;
  bottom: 4px;
  left: 4px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 8px;
}

/* 설정 */
.settings {
  width: 100%;
  max-width: 600px;
  margin-top: 20px;
  display: none;
}

.settings label { display: block; color: #aaa; font-size: 0.9rem; margin-bottom: 8px; }

.settings input[type="text"] {
  width: 100%;
  padding: 14px 18px;
  border-radius: 12px;
  border: 2px solid #333;
  background: #111;
  color: #fff;
  font-size: 1rem;
  margin-bottom: 20px;
  outline: none;
  transition: border-color 0.3s;
}

.settings input[type="text"]:focus { border-color: #ff6b6b; }

.round-select-area {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.round-option {
  padding: 10px 20px;
  border-radius: 12px;
  border: 2px solid #333;
  background: #111;
  color: #aaa;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.round-option:hover { border-color: #ff6b6b; color: #fff; }
.round-option.active { border-color: #feca57; color: #feca57; background: #1a1600; }

.start-btn {
  width: 100%;
  max-width: 600px;
  padding: 18px;
  font-size: 1.3rem;
  font-weight: 700;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: #fff;
  cursor: pointer;
  transition: all 0.3s;
  display: none;
  margin-top: 10px;
}

.start-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(255, 107, 107, 0.4);
}

/* ===== 게임 화면 ===== */
#game-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.round-info { text-align: center; margin-bottom: 16px; width: 100%; }

.round-info .game-title {
  color: #feca57;
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 4px;
}

.round-info .round-title {
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #ff6b6b, #feca57);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.round-info .match-count { color: #888; font-size: 0.95rem; margin-top: 4px; }

/* 진행바 */
.progress-bar-container {
  width: 100%;
  max-width: 500px;
  height: 6px;
  background: #222;
  border-radius: 3px;
  margin-bottom: 24px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #ff6b6b, #feca57);
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* VS 배틀 */
.battle-container {
  display: flex;
  width: 100%;
  max-width: 900px;
  gap: 12px;
  align-items: stretch;
  flex: 1;
}

.contestant {
  flex: 1;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  border-radius: 20px;
  overflow: hidden;
  border: 3px solid #222;
  transition: all 0.3s;
  background: #111;
  position: relative;
}

.contestant:hover { border-color: #ff6b6b; transform: scale(1.02); }
.contestant:active { transform: scale(0.98); }

.contestant.selected {
  border-color: #feca57;
  box-shadow: 0 0 40px rgba(254, 202, 87, 0.3);
}

.contestant.picking-disabled { pointer-events: none; }

.contestant .image-wrap {
  flex: 1;
  min-height: 250px;
  position: relative;
  overflow: hidden;
}

.contestant img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
}

.contestant .number-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
  backdrop-filter: blur(10px);
}

.vs-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: 900;
  color: #ff6b6b;
  text-shadow: 0 0 20px rgba(255,107,107,0.5);
  min-width: 50px;
}

/* ===== 결과 화면 ===== */
#result-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  text-align: center;
}

.result-game-title {
  font-size: 1rem;
  color: #888;
  margin-bottom: 8px;
}

.winner-label {
  font-size: 1.4rem;
  color: #feca57;
  margin-bottom: 16px;
  letter-spacing: 4px;
  font-weight: 700;
}

.winner-image-wrap {
  width: 100%;
  max-width: 450px;
  aspect-ratio: 3/4;
  border-radius: 24px;
  overflow: hidden;
  border: 4px solid #feca57;
  box-shadow: 0 0 60px rgba(254,202,87,0.3);
  margin-bottom: 20px;
  position: relative;
}

.winner-image-wrap img { width: 100%; height: 100%; object-fit: cover; }

.winner-number {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 30px;
  color: #fff;
}

.ranking-section {
  width: 100%;
  max-width: 500px;
  margin-top: 10px;
  margin-bottom: 30px;
}

.ranking-section h3 { font-size: 1rem; color: #888; margin-bottom: 12px; }

.ranking-list {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.ranking-item { text-align: center; }
.ranking-item .rank { font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }

.ranking-item img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 12px;
  border: 2px solid #333;
}

.ranking-item:first-child img { border-color: #c0c0c0; }

.result-buttons { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }

.btn {
  padding: 14px 32px;
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-primary { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: #fff; }
.btn-secondary { background: #222; color: #fff; border: 2px solid #333; }
.btn:hover { transform: translateY(-2px); }

/* 애니메이션 */
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-60px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(60px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes bounceIn {
  0% { opacity: 0; transform: scale(0.3); }
  50% { transform: scale(1.05); }
  70% { transform: scale(0.9); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes confetti-fall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.slide-left { animation: slideInLeft 0.5s ease; }
.slide-right { animation: slideInRight 0.5s ease; }
.bounce-in { animation: bounceIn 0.8s ease; }

/* 꽃가루 */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  z-index: 1000;
  pointer-events: none;
}

/* 모바일 */
@media (max-width: 768px) {
  #upload-screen h1 { font-size: 1.8rem; }
  .battle-container { flex-direction: column; }
  .vs-divider { min-width: auto; min-height: 30px; font-size: 1.5rem; }
  .contestant .image-wrap { min-height: 200px; }
  .round-info .round-title { font-size: 1.5rem; }
  .preview-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }
}

@media (max-width: 480px) {
  .contestant .image-wrap { min-height: 150px; }
}
</style>
</head>
<body>

<!-- ===== 업로드 화면 ===== -->
<div id="upload-screen">
  <h1>🏆 패션 월드컵</h1>
  <p class="subtitle">이상형 월드컵 토너먼트</p>

  <div class="upload-area" id="upload-area">
    <div class="icon">📸</div>
    <p>사진을 드래그하거나 클릭해서 업로드</p>
    <p class="hint">2장 이상 업로드하세요</p>
  </div>
  <input type="file" id="file-input" multiple accept="image/*">

  <div class="preview-section" id="preview-section">
    <h3>업로드된 사진: <span id="photo-count">0</span>장</h3>
    <div class="preview-grid" id="preview-grid"></div>
  </div>

  <div class="settings" id="settings">
    <label>월드컵 제목 (선택사항)</label>
    <input type="text" id="title-input" placeholder="예: 워스트 패션 월드컵">
    <label>라운드 선택</label>
    <div class="round-select-area" id="round-select-area"></div>
  </div>

  <button class="start-btn" id="start-btn">🏆 월드컵 시작!</button>
</div>

<!-- ===== 게임 화면 ===== -->
<div id="game-screen">
  <div class="round-info">
    <div class="game-title" id="game-title"></div>
    <div class="round-title" id="round-title">32강</div>
    <div class="match-count" id="match-count">1 / 16</div>
  </div>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="battle-container" id="battle-container">
    <div class="contestant" id="contestant-left" onclick="pick(0)">
      <div class="image-wrap">
        <img id="img-left" src="" alt="">
        <div class="number-badge" id="badge-left"></div>
      </div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="contestant" id="contestant-right" onclick="pick(1)">
      <div class="image-wrap">
        <img id="img-right" src="" alt="">
        <div class="number-badge" id="badge-right"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 결과 화면 ===== -->
<div id="result-screen">
  <div class="result-game-title" id="result-game-title"></div>
  <div class="winner-label">👑 우 승</div>
  <div class="winner-image-wrap bounce-in">
    <img id="winner-img" src="" alt="">
  </div>
  <div class="winner-number" id="winner-number"></div>

  <div class="ranking-section" id="ranking-section">
    <h3>🏅 최종 순위</h3>
    <div class="ranking-list" id="ranking-list"></div>
  </div>

  <div class="result-buttons">
    <button class="btn btn-primary" onclick="restartSamePhotos()">🔄 다시하기</button>
    <button class="btn btn-secondary" onclick="resetAll()">📸 새 사진</button>
  </div>
</div>

<script>
// ===== 상태 =====
let photos = [];          // { src, index }
let matches = [];         // 현재 라운드의 매치들: [[a,b], [a,b], ...]
let nextRoundPlayers = [];// 다음 라운드 진출자
let matchIdx = 0;         // 현재 매치
let totalMatchesInRound = 0;
let bracketSize = 0;      // 전체 브라켓 크기 (32, 16, 8 등)
let currentRoundNum = 0;  // 현재 강 숫자 (32, 16, 8, 4, 2)
let semiLosers = [];      // 4강 탈락자 (공동 3위)
let finalistPair = null;  // 결승 페어 저장
let isPicking = false;    // 중복 클릭 방지
let selectedBracket = 0;  // 사용자가 선택한 강 수

// ===== 업로드 =====
const uploadArea = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); fileInput.value = ''; });

function handleFiles(files) {
  Array.from(files).filter(f => f.type.startsWith('image/')).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      photos.push({ src: e.target.result, index: photos.length + 1 });
      updatePreview();
    };
    reader.readAsDataURL(file);
  });
}

function updatePreview() {
  const section = document.getElementById('preview-section');
  const grid = document.getElementById('preview-grid');
  const count = document.getElementById('photo-count');
  const settingsEl = document.getElementById('settings');
  const btn = document.getElementById('start-btn');

  if (photos.length === 0) {
    section.style.display = 'none';
    settingsEl.style.display = 'none';
    btn.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  count.textContent = photos.length;

  grid.innerHTML = '';
  photos.forEach((photo, i) => {
    const item = document.createElement('div');
    item.className = 'preview-item';
    item.innerHTML = `
      <img src="${photo.src}" alt="${photo.index}번">
      <span class="photo-number">${photo.index}</span>
      <button class="remove-btn" onclick="removePhoto(${i})">×</button>
    `;
    grid.appendChild(item);
  });

  if (photos.length >= 2) {
    settingsEl.style.display = 'block';
    btn.style.display = 'block';
    updateRoundOptions();
  } else {
    settingsEl.style.display = 'none';
    btn.style.display = 'none';
  }
}

function updateRoundOptions() {
  const area = document.getElementById('round-select-area');
  area.innerHTML = '';

  const n = photos.length;
  // 가능한 라운드: 2의 거듭제곱 중 n 이하인 것들 + n 이상의 최소 거듭제곱
  const options = [];
  let p = 2;
  while (p <= 128) {
    if (p <= n) options.push(p);
    p *= 2;
  }
  // n 자체가 2의 거듭제곱이 아니면 올림한 것도 추가
  let ceil = 2;
  while (ceil < n) ceil *= 2;
  if (!options.includes(ceil) && ceil <= 128) options.push(ceil);

  // 최소 4개 이상이면 "전체" 옵션 (가장 큰 값)
  const maxOption = Math.max(...options);

  options.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'round-option';
    btn.textContent = opt + '강';
    btn.dataset.value = opt;
    btn.onclick = () => selectRound(opt);
    area.appendChild(btn);
  });

  // 기본 선택: 가장 큰 라운드 (전체)
  selectRound(maxOption);
}

function selectRound(val) {
  selectedBracket = val;
  document.querySelectorAll('.round-option').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.value) === val);
  });
  document.getElementById('start-btn').textContent = `🏆 ${val}강 월드컵 시작!`;
}

function removePhoto(idx) {
  photos.splice(idx, 1);
  photos.forEach((p, i) => p.index = i + 1);
  updatePreview();
}

// ===== 게임 시작 =====
document.getElementById('start-btn').addEventListener('click', startGame);

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  if (photos.length < 2) return;

  const title = document.getElementById('title-input').value;
  document.getElementById('game-title').textContent = title || '';
  document.getElementById('result-game-title').textContent = title || '';

  semiLosers = [];
  finalistPair = null;
  isPicking = false;

  // 참가자 수 결정
  let players = shuffle([...photos]);

  // 선택한 강 수에 맞게 참가자 수 조정
  if (selectedBracket < players.length) {
    // 랜덤으로 selectedBracket명만 선택
    players = players.slice(0, selectedBracket);
  }

  bracketSize = selectedBracket;

  // 부전승 계산
  const byeCount = bracketSize - players.length;

  if (byeCount === 0) {
    // 부전승 없음 - 바로 매치
    currentRoundNum = bracketSize;
    setupRound(players);
  } else {
    // 부전승 있음
    // 앞쪽 byeCount명은 자동 진출, 나머지는 첫 라운드 플레이
    const byePlayers = players.slice(0, byeCount);
    const playingPlayers = players.slice(byeCount);

    currentRoundNum = bracketSize;
    nextRoundPlayers = [...byePlayers];
    setupMatches(playingPlayers);
  }

  showScreen('game');
}

function setupRound(players) {
  // players 배열을 페어링해서 매치 생성
  nextRoundPlayers = [];

  // 홀수면 마지막 한 명은 부전승
  if (players.length % 2 === 1) {
    nextRoundPlayers.push(players.pop());
  }

  setupMatches(players);
}

function setupMatches(players) {
  matches = [];
  for (let i = 0; i < players.length; i += 2) {
    matches.push([players[i], players[i + 1]]);
  }
  matchIdx = 0;
  totalMatchesInRound = matches.length;
  updateDisplay();
  showCurrentMatch();
}

function getRoundLabel(num) {
  if (num === 2) return '🏆 결승';
  return num + '강';
}

function updateDisplay() {
  document.getElementById('round-title').textContent = getRoundLabel(currentRoundNum);
  document.getElementById('match-count').textContent = `${matchIdx + 1} / ${totalMatchesInRound}`;
  const progress = matchIdx / totalMatchesInRound * 100;
  document.getElementById('progress-bar').style.width = progress + '%';
}

function showCurrentMatch() {
  if (matchIdx >= matches.length) {
    endRound();
    return;
  }

  updateDisplay();

  const [left, right] = matches[matchIdx];
  const contLeft = document.getElementById('contestant-left');
  const contRight = document.getElementById('contestant-right');

  contLeft.classList.remove('selected', 'slide-left', 'picking-disabled');
  contRight.classList.remove('selected', 'slide-right', 'picking-disabled');
  void contLeft.offsetWidth; // 리플로우

  document.getElementById('img-left').src = left.src;
  document.getElementById('img-right').src = right.src;
  document.getElementById('badge-left').textContent = `#${left.index}`;
  document.getElementById('badge-right').textContent = `#${right.index}`;

  contLeft.classList.add('slide-left');
  contRight.classList.add('slide-right');

  isPicking = false;
}

function pick(side) {
  if (isPicking) return;
  isPicking = true;

  const [a, b] = matches[matchIdx];
  const winner = side === 0 ? a : b;
  const loser = side === 0 ? b : a;

  // 선택 효과
  const contId = side === 0 ? 'contestant-left' : 'contestant-right';
  const otherId = side === 0 ? 'contestant-right' : 'contestant-left';
  document.getElementById(contId).classList.add('selected');
  document.getElementById(contId).classList.add('picking-disabled');
  document.getElementById(otherId).classList.add('picking-disabled');

  // 4강이면 탈락자 기록
  if (currentRoundNum === 4) {
    semiLosers.push(loser);
  }

  // 결승 페어 기록
  if (currentRoundNum === 2) {
    finalistPair = [a, b];
  }

  nextRoundPlayers.push(winner);
  matchIdx++;

  setTimeout(() => showCurrentMatch(), 500);
}

function endRound() {
  const advancing = [...nextRoundPlayers];

  if (advancing.length === 1) {
    showWinner(advancing[0]);
    return;
  }

  // 다음 라운드
  currentRoundNum = advancing.length;
  // 가장 가까운 2의 거듭제곱 이하로 맞추기
  // 실제로는 advancing.length가 정확히 다음 라운드 수
  if (advancing.length === 2) currentRoundNum = 2;
  else if (advancing.length <= 4) currentRoundNum = 4;
  else if (advancing.length <= 8) currentRoundNum = 8;
  else if (advancing.length <= 16) currentRoundNum = 16;
  else if (advancing.length <= 32) currentRoundNum = 32;
  else currentRoundNum = 64;

  setupRound(advancing);
}

// ===== 우승 =====
function showWinner(winner) {
  showScreen('result');

  document.getElementById('winner-img').src = winner.src;
  document.getElementById('winner-number').textContent = `#${winner.index}번`;

  const rankingList = document.getElementById('ranking-list');
  rankingList.innerHTML = '';

  // 준우승
  if (finalistPair) {
    const runnerUp = finalistPair[0] === winner ? finalistPair[1] : finalistPair[0];
    const item = document.createElement('div');
    item.className = 'ranking-item';
    item.innerHTML = `<div class="rank">🥈 준우승</div><img src="${runnerUp.src}" alt="#${runnerUp.index}">`;
    rankingList.appendChild(item);
  }

  // 3위
  semiLosers.forEach(loser => {
    const item = document.createElement('div');
    item.className = 'ranking-item';
    item.innerHTML = `<div class="rank">🥉 3위</div><img src="${loser.src}" alt="#${loser.index}">`;
    rankingList.appendChild(item);
  });

  document.getElementById('ranking-section').style.display = rankingList.children.length > 0 ? 'block' : 'none';

  launchConfetti();
}

function launchConfetti() {
  const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#55efc4', '#a29bfe'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (Math.random() * 10 + 5) + 'px';
    el.style.height = (Math.random() * 10 + 5) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animation = `confetti-fall ${Math.random() * 3 + 2}s linear forwards`;
    el.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

// ===== 다시하기 / 리셋 =====
function restartSamePhotos() { startGame(); }

function resetAll() {
  photos = [];
  updatePreview();
  document.getElementById('title-input').value = '';
  showScreen('upload');
}

function showScreen(name) {
  document.getElementById('upload-screen').style.display = name === 'upload' ? 'flex' : 'none';
  document.getElementById('game-screen').style.display = name === 'game' ? 'flex' : 'none';
  document.getElementById('result-screen').style.display = name === 'result' ? 'flex' : 'none';
  window.scrollTo(0, 0);
}
</script>
